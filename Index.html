  overlay.className='sheet-overlay';
  overlay.innerHTML=
    '<div class="sheet">'+
      '<div class="sheet-handle"></div>'+

    }else if(d&&d.error){
      text='Could not reach AI — check that ANTHROPIC_API_KEY is set in your Netlify environment variables.';

        '<div style="font-size:12px;color:var(--fog)">'+(s.bean||'Unnamed')+' \u00b7 Grind '+s.grind+' \u00b7 '+s.dose+'g\u2192'+s.yld+'g \u00b7 '+s.infT+'s \u00b7 '+s.overall+'/10</div>'+

    dialInActive=false;
  });
}

// AI BEAN LOOKUP — called when barcode/DB lookup finds nothing
// Sends bean name + roaster to Claude via Netlify function
// Returns structured bean data to pre-fill the shot form
// ═══════════════════════════════════════════════════════════════
function aiBeanLookup(query, cb){
  // query: {name, roaster, barcode}
  var system = 'You are a specialty coffee expert with encyclopedic knowledge of coffee roasters, origins, and beans. When given a coffee product name or description, return ONLY a JSON object with these exact fields: {"name":"full bean name","roaster":"roaster name","origin":"country or region","roastLevel":"Light|Light-Medium|Medium|Medium-Dark|Dark","flavorNotes":"brief tasting notes","suggestedDose":18,"suggestedYield":36,"suggestedTemp":93,"found":true}. If you cannot identify the coffee, return {"found":false}. No other text, just the JSON.';

  var userMsg = 'Identify this coffee and return its details as JSON:\n';
  if(query.name) userMsg += 'Name: ' + query.name + '\n';
  if(query.roaster) userMsg += 'Roaster: ' + query.roaster + '\n';
  if(query.barcode) userMsg += 'Barcode: ' + query.barcode + '\n';
  userMsg += '\nReturn JSON only.';

  fetch('/.netlify/functions/claude', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 200,
      system: system,
      messages: [{role:'user', content: userMsg}]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d && d.content && d.content[0] && d.content[0].text){
      try{
        var txt = d.content[0].text.trim();
        // Strip any markdown code fences if present
        txt = txt.replace(/^```json?\s*/,'').replace(/\s*```$/,'');
        var bean = JSON.parse(txt);
        cb(bean);
      }catch(e){
        cb({found:false});
      }
    }else{
      cb({found:false});
    }
  })
  .catch(function(){ cb({found:false}); });
}

// Handle AI bean result — apply to current F fields
function applyAIBean(bean, barcode){
  if(!bean || !bean.found) return false;
  if(bean.name) F.bean = bean.name;
  if(bean.roaster) F.roaster = bean.roaster;
  if(bean.origin) F.origin = bean.origin;
  if(bean.roastLevel) F.roastLevel = bean.roastLevel;
  if(bean.suggestedDose) F.dose = bean.suggestedDose;
  if(bean.suggestedYield) F.yld = bean.suggestedYield;
  if(bean.suggestedTemp) F.brewTemp = bean.suggestedTemp;
  if(barcode) F.barcode = barcode;
  // Save to bean library
  if(bean.name){
    var saved = saveBeanToLib({
      name:bean.name, roaster:bean.roaster||'', origin:bean.origin||'',
      roastLevel:bean.roastLevel||'Medium', barcode:barcode||null,
      scanSource:'ai', flavorNotes:bean.flavorNotes||''
    });
    if(saved){ F.beanId = saved.id; bumpBean(saved.id); }
  }
  return true;
}

function impJSON(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.addEventListener('change',function(){
    var file=inp.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var backup=JSON.parse(e.target.result);
        if(!backup.shots||!Array.isArray(backup.shots)){toast('Invalid backup file');return}
        shots=backup.shots||[];
        diary=backup.diary||[];
        beans=backup.beans||[];
        if(backup.settings)settings=Object.assign(settings,backup.settings);
        if(backup.userEq)userEq=Object.assign(userEq,backup.userEq);
        sS();sD();sBn();sSt();sEq();
        toast('Restored — '+shots.length+' shots');
        go('log');
      }catch(err){toast('Could not read backup file')}
    };
    reader.readAsText(file);
  });
  inp.click();
}

// ─── COMPARE ──────────────────────────────────────────────────────────
function rCompare(){
  var h='<div class="page-hdr"><div class="page-eyebrow">Pull \u00b7 Compare</div><div class="page-title">Compare</div><div class="page-sub">Any two shots, side by side</div></div><div class="page-body">';
  h+='<div style="font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:14px">Setup Analysis</div>';
  h+=cmpB('EPF Filter',shots.filter(function(s){return s.epf}),shots.filter(function(s){return!s.epf}),'With EPF','Without');
  h+=cmpB('Puck Screen',shots.filter(function(s){return s.puckScreen}),shots.filter(function(s){return!s.puckScreen}),'With Screen','Without');
  h+=cmpB('RDT',shots.filter(function(s){return s.rdt}),shots.filter(function(s){return!s.rdt}),'With RDT','Without');
  if(shots.length>=2){
    h+='<div style="font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin:28px 0 14px;padding-top:20px;border-top:1px solid var(--edge)">Shot vs Shot</div>';
    h+='<div class="fg"><label class="fl">Shot A</label><select class="fsel" id="cmp-a"><option value="">Select...</option>';
    shots.slice(0,30).forEach(function(s){h+='<option value="'+s.id+'"'+(s.id===cmpSelA?' selected':'')+'>'+s.date+' \u2014 '+(s.bean||'Unnamed')+' \u00b7 '+s.overall+'</option>'});
    h+='</select></div><div class="fg"><label class="fl">Shot B</label><select class="fsel" id="cmp-b"><option value="">Select...</option>';
    shots.slice(0,30).forEach(function(s){h+='<option value="'+s.id+'"'+(s.id===cmpSelB?' selected':'')+'>'+s.date+' \u2014 '+(s.bean||'Unnamed')+' \u00b7 '+s.overall+'</option>'});
    h+='</select></div>';
    if(cmpSelA&&cmpSelB&&cmpSelA!==cmpSelB){var sA=null,sB=null;shots.forEach(function(s){if(s.id===cmpSelA)sA=s;if(s.id===cmpSelB)sB=s});if(sA&&sB)h+=renderShotComparison(sA,sB);}
    else if(cmpSelA&&cmpSelB)h+='<div style="font-size:12px;color:var(--amber);padding:12px 0">Select two different shots.</div>';
  }
  return h+'</div>';
}
var cmpSelA=null,cmpSelB=null;
function attachCompareEvents(){
  var ca=document.getElementById('cmp-a');if(ca)ca.addEventListener('change',function(){cmpSelA=this.value;go('compare')});
  var cb=document.getElementById('cmp-b');if(cb)cb.addEventListener('change',function(){cmpSelB=this.value;go('compare')});
}

// ─── TIMER ────────────────────────────────────────────────────────────
var timerState={running:false,startMs:0,elapsed:0,raf:null,phase:'preInf'};
function openTimer(){
  var ov=document.getElementById('timer-overlay');if(!ov)return;
  var td=document.getElementById('t-dose');if(td)td.textContent=F.dose+'g';
  var tg=document.getElementById('t-grind');if(tg)tg.textContent=F.grind||'\u2014';
  var tt=document.getElementById('t-temp');if(tt)tt.textContent=F.brewTemp+'\u00b0';
  var target=F.preInfOn?(F.preInfT+F.infT):F.infT;
  var ttarg=document.getElementById('t-target');if(ttarg)ttarg.textContent='Target: '+target+'s';
  var tph=document.getElementById('t-phase');if(tph)tph.textContent=F.preInfOn?'Pre-Infusion':'Main Infusion';
  timerState={running:false,startMs:0,elapsed:0,raf:null,phase:F.preInfOn?'preInf':'main'};
  updateTimerDisplay(0);
  var btn=document.getElementById('t-main');if(btn){btn.textContent='Start';btn.className='timer-btn-main timer-btn-start'}
  ov.classList.add('open');
  var cancel=document.getElementById('t-cancel');
  if(cancel)cancel.onclick=function(){stopTimer();ov.classList.remove('open')};
  if(btn)btn.onclick=function(){if(!timerState.running){startTimer()}else{stopTimer();ov.classList.remove('open');applyTimerResult()}};
}
function startTimer(){
  timerState.running=true;timerState.startMs=Date.now()-timerState.elapsed*1000;
  var btn=document.getElementById('t-main');if(btn){btn.textContent='Stop Shot';btn.className='timer-btn-main timer-btn-stop'}
  tickTimer();
}
function tickTimer(){
  if(!timerState.running)return;
  var elapsed=(Date.now()-timerState.startMs)/1000;timerState.elapsed=elapsed;
  updateTimerDisplay(elapsed);
  if(F.preInfOn&&timerState.phase==='preInf'&&elapsed>=F.preInfT){timerState.phase='main';var ph=document.getElementById('t-phase');if(ph)ph.textContent='Main Infusion'}
  timerState.raf=requestAnimationFrame(tickTimer);
}
function stopTimer(){timerState.running=false;if(timerState.raf){cancelAnimationFrame(timerState.raf);timerState.raf=null}}
function updateTimerDisplay(s){
  var n=document.getElementById('t-num');var ring=document.getElementById('t-ring');
  var target=F.preInfOn?(F.preInfT+F.infT):F.infT;
  if(n){n.textContent=s.toFixed(1);if(s<target*0.85)n.style.color='var(--white)';else if(s<target)n.style.color='var(--gold)';else if(s<target*1.15)n.style.color='var(--amber)';else n.style.color='var(--red)'}
  if(ring){var circ=2*Math.PI*130;var prog=Math.min(s/target,1);ring.setAttribute('stroke-dashoffset',String(circ*(1-prog)));if(s>target)ring.setAttribute('stroke','var(--amber)');else ring.setAttribute('stroke','var(--gold)')}
}
function applyTimerResult(){F.actualTime=parseFloat(timerState.elapsed.toFixed(1));F.infT=Math.round(timerState.elapsed);if(tab==='new')rr();toast('Shot time: '+F.actualTime+'s')}

// ─── BEAN AGING ───────────────────────────────────────────────────────
function getBeanAging(){
  var rd=F.roastDate||(F.beanId?findBeanById(F.beanId)&&findBeanById(F.beanId).roastDate:null);
  if(!rd)return null;
  var roastMs=new Date(rd).getTime();if(isNaN(roastMs))return null;
  var days=Math.floor((Date.now()-roastMs)/864e5);
  if(days<0)return{color:'var(--blue)',rgb:'74,128,208,.06',rgb2:'74,128,208,.2',msg:'Roasted in the future? Check the date.'};
  if(days<=4)return{color:'var(--blue)',rgb:'74,128,208,.06',rgb2:'74,128,208,.2',msg:'Day '+days+' off roast. Too fresh \u2014 CO\u2082 causes channeling. Best from day 7.'};
  if(days<=7)return{color:'var(--amber)',rgb:'232,146,74,.06',rgb2:'232,146,74,.2',msg:'Day '+days+' off roast. Degassing. Peak window opens around day 7\u201310.'};
  if(days<=14)return{color:'var(--green)',rgb:'61,170,114,.06',rgb2:'61,170,114,.2',msg:'Day '+days+' off roast. Prime window. Peak extraction. Pull now.'};
  if(days<=21)return{color:'var(--green)',rgb:'61,170,114,.06',rgb2:'61,170,114,.2',msg:'Day '+days+' off roast. Still great. Last days of peak sweetness.'};
  if(days<=35)return{color:'var(--amber)',rgb:'232,146,74,.06',rgb2:'232,146,74,.2',msg:'Day '+days+' off roast. Past peak. Expect less brightness. Dose slightly heavier.'};
  return{color:'var(--red)',rgb:'200,80,64,.06',rgb2:'200,80,64,.2',msg:'Day '+days+' off roast. Stale. Expect flat extraction. Time for a fresh bag.'};
}
function getBeanAgingForShot(s){
  if(!s)return null;
  var rd=s.roastDate;
  if(!rd&&s.beanId){var lb=findBeanById(s.beanId);if(lb&&lb.roastDate)rd=lb.roastDate;}
  if(!rd)return null;
  var days=Math.floor((new Date(s.date).getTime()-new Date(rd).getTime())/864e5);
  if(isNaN(days)||days<0)return null;
  if(days<=4)return'Day '+days+' \u2014 Too fresh (CO\u2082)';
  if(days<=7)return'Day '+days+' \u2014 Degassing';
  if(days<=14)return'Day '+days+' \u2014 Prime window \u2713';
  if(days<=21)return'Day '+days+' \u2014 Peak sweetness';
  if(days<=35)return'Day '+days+' \u2014 Past peak';
  return'Day '+days+' \u2014 Stale';
}

// ─── PATTERN COACHING ─────────────────────────────────────────────────
function getPatternInsights(){
  if(shots.length<5)return null;
  var insights=[];
  var recent=shots.slice(0,10);
  var firstHalf=avg(recent.slice(Math.floor(recent.length/2)).map(function(s){return s.overall}));
  var secondHalf=avg(recent.slice(0,Math.floor(recent.length/2)).map(function(s){return s.overall}));
  var trend=secondHalf-firstHalf;
  if(trend>=0.5)insights.push({icon:'\u2197',title:'On the rise',body:'Last '+Math.floor(recent.length/2)+' shots avg '+secondHalf.toFixed(1)+' vs '+firstHalf.toFixed(1)+' before. You\u2019re dialing in.'});
  else if(trend<=-0.5)insights.push({icon:'\u2198',title:'Slipping',body:'Recent shots averaging '+secondHalf.toFixed(1)+' vs '+firstHalf.toFixed(1)+' before. Check grind freshness or dose.'});
  var grindMap={};
  shots.slice(0,30).forEach(function(s){if(!s.grind)return;if(!grindMap[s.grind])grindMap[s.grind]=[];grindMap[s.grind].push(s.overall)});
  var bg=null,bga=0;
  Object.keys(grindMap).forEach(function(g){if(grindMap[g].length>=2){var a=avg(grindMap[g]);if(a>bga){bga=a;bg=g}}});
  if(bg)insights.push({icon:'\u2605',title:'Sweet spot',body:'Grind '+bg+' averages '+bga.toFixed(2)+'/10 across '+grindMap[bg].length+' shots.'});
  var epfY=shots.filter(function(s){return s.epf}).slice(0,15);
  var epfN=shots.filter(function(s){return!s.epf}).slice(0,15);
  if(epfY.length>=3&&epfN.length>=3){
    var ea=avg(epfY.map(function(s){return s.overall})),na=avg(epfN.map(function(s){return s.overall}));
    if(Math.abs(ea-na)>=0.3)insights.push({icon:'\u25c8',title:'EPF impact',body:'EPF shots: '+ea.toFixed(1)+' vs '+na.toFixed(1)+' without. '+(ea>na?'EPF is helping.':'EPF isn\u2019t helping on your setup.')});
  }
  return insights.slice(0,3);
}
function getGrindSuggestion(){
  if(shots.length<3)return null;
  var byGrind={};
  shots.slice(0,20).forEach(function(s){if(!s.grind)return;var g=String(s.grind);if(!byGrind[g])byGrind[g]=[];byGrind[g].push(s.overall)});
  var grindKeys=Object.keys(byGrind);if(grindKeys.length<2)return null;
  var bestGrind=null,bestAvg=0;
  grindKeys.forEach(function(g){var a=avg(byGrind[g]);if(a>bestAvg){bestAvg=a;bestGrind=g}});
  var currentGrind=F.grind||shots[0].grind;if(!currentGrind||!bestGrind)return null;
  var bestA=parseFloat(bestAvg.toFixed(2));
  if(bestGrind===String(currentGrind))return'Your best results (\u00f8'+bestA+') are at grind '+bestGrind+'. You\u2019re already there.';
  return'Your highest avg (\u00f8'+bestA+'/10) is at grind '+bestGrind+'. Current: '+(currentGrind||'\u2014')+'.';
}
function getDetailedSuggestion(s){
  var suggestions=[];
  var recentSame=shots.filter(function(x){return x.grind===s.grind&&x.id!==s.id}).slice(0,4);
  var avgScore=avg(recentSame.map(function(x){return x.overall}).concat([s.overall]));
  if(s.bitterness>=7.5)suggestions.push('Bitterness high ('+s.bitterness+'). Try '+grinderAdjust('coarser')+' on '+grinderName()+'.');
  if(s.sweetness<=5.5)suggestions.push('Sweetness low ('+s.sweetness+'). Try finer or add EPF filter.');
  if(s.extraction==='Under-Extracted')suggestions.push('Under-extracted. Go finer or extend to '+(s.infT+3)+'s.');
  if(s.extraction==='Over-Extracted')suggestions.push('Over-extracted. Go coarser or cut to '+(Math.max(s.infT-3,18))+'s.');
  if(s.overall<7&&recentSame.length>=2&&avgScore<7)suggestions.push('3+ shots at grind '+s.grind+' averaging '+avgScore.toFixed(1)+'. Try a bigger grind change.');
  if(!suggestions.length&&s.overall>=8.5)suggestions.push('Dialed in. Same grind next shot.');
  return suggestions.slice(0,2).join(' ');
}

// ═══════════════════════════════════════════════════════════════
// FEATURE 6: MORNING RITUAL SCREEN
// ═══════════════════════════════════════════════════════════════
function shouldShowMorning(){
  var h=new Date().getHours();
  var isMorning=(h>=5&&h<12);
  var notToday=settings.lastWelcomeDate!==new Date().toISOString().slice(0,10);
  var hasShots=shots.length>=1;
  return settings.showDailyWelcome&&isMorning&&notToday&&hasShots;
}

function renderMorning(){
  var mr=document.getElementById('morning');
  if(!mr)return;
  var now=new Date();
  var h=now.getHours();
  var fn=settings.userName?settings.userName.split(' ')[0]:'';
  var greeting=h<8?'Good morning':h<10?'Morning':'Good morning';
  var subgreeting=h<8?'Early pull today.':h<9?'The grinder is warm.':'Coffee time.';
  var dateLong=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var streak=calcStreak();
  var avgS=shots.length?(shots.reduce(function(s,x){return s+x.overall},0)/shots.length).toFixed(1):null;

  // Current bag — most recently used bean
  var lastShot=shots[0];
  var aging=lastShot?getBeanAging():null;
  // Temporarily set F.roastDate to get aging for current bag
  var savedRD=F.roastDate;
  if(lastShot&&lastShot.roastDate)F.roastDate=lastShot.roastDate;
  aging=getBeanAging();
  F.roastDate=savedRD;

  // Personal best on this bean
  var beanBest=null;
  if(lastShot&&lastShot.bean){
    var beanShots=shots.filter(function(s){return s.bean===lastShot.bean});
    if(beanShots.length)beanBest=beanShots.reduce(function(b,s){return s.overall>b.overall?s:b},beanShots[0]);
  }

  // Yesterday's shot
  var yesterday=new Date(Date.now()-864e5).toISOString().slice(0,10);
  var yShot=null;
  for(var i=0;i<shots.length;i++){if(shots[i].date===yesterday){yShot=shots[i];break;}}

  var h2='<div class="mr-bg"></div><div class="mr-content">';
  h2+='<div class="mr-date">'+dateLong+'</div>';
  h2+='<div class="mr-greeting">'+greeting+(fn?',<br>'+fn:'')+'.</div>';
  h2+='<div class="mr-subgreet">'+subgreeting+'</div>';

  // Current bag card
  if(lastShot&&lastShot.bean){
    h2+='<div class="mr-bag"><div class="mr-bag-eyebrow">Current Bag</div>';
    h2+='<div class="mr-bag-name">'+(lastShot.bean||'Unnamed')+'</div>';
    h2+='<div class="mr-bag-roaster">'+(lastShot.roaster||'Unknown roaster')+'</div>';
    if(aging){
      var agingBg=aging.color==='var(--green)'?'rgba(61,170,114,.1)':aging.color==='var(--amber)'?'rgba(232,146,74,.1)':'rgba(200,80,64,.1)';
      h2+='<div class="mr-bag-age" style="background:'+agingBg+';border:1px solid rgba('+aging.rgb2+')">';
      h2+='<div class="mr-bag-age-dot" style="background:'+aging.color+'"></div>';
      h2+='<div class="mr-bag-age-txt" style="color:'+aging.color+'">'+aging.msg+'</div></div>';
    }
    if(beanBest){
      var ratio=(beanBest.yld/beanBest.dose).toFixed(2);
      h2+='<div class="mr-recipe-cell mr-bag-eyebrow" style="margin-bottom:8px">Best Recipe on this Bean</div>';
      h2+='<div class="mr-recipe">';
      h2+='<div class="mr-recipe-cell"><span class="mr-recipe-v">'+(beanBest.grind||'\u2014')+'</span><span class="mr-recipe-k">Grind</span></div>';
      h2+='<div class="mr-recipe-cell"><span class="mr-recipe-v">'+beanBest.dose+'g</span><span class="mr-recipe-k">Dose</span></div>';
      h2+='<div class="mr-recipe-cell"><span class="mr-recipe-v">1:'+ratio+'</span><span class="mr-recipe-k">Ratio</span></div>';
      h2+='<div class="mr-recipe-cell"><span class="mr-recipe-v">'+beanBest.infT+'s</span><span class="mr-recipe-k">Time</span></div>';
      h2+='</div>';
    }
    h2+='</div>';
  }

  // Personal best overall
  var topShot=shots.reduce(function(b,s){return s.overall>b.overall?s:b},shots[0]);
  if(topShot){
    h2+='<div class="mr-best"><div class="mr-best-lbl">Personal Best</div>';
    h2+='<div class="mr-best-row">';
    h2+='<div class="mr-best-bean">'+(topShot.bean||'Unnamed')+'<br><span style="font-size:11px;color:var(--fog);font-style:italic">'+(topShot.roaster||'')+'</span></div>';
    h2+='<div class="mr-best-score" style="color:'+sC(topShot.overall)+'">'+topShot.overall+'</div>';
    h2+='</div></div>';
  }

  // Yesterday's shot
  if(yShot){
    h2+='<div class="mr-yesterday">';
    h2+='<div class="mr-yesterday-score" style="color:'+sC(yShot.overall)+'">'+yShot.overall+'</div>';
    h2+='<div class="mr-yesterday-info">';
    h2+='<div class="mr-yesterday-bean">'+(yShot.bean||'Unnamed')+'</div>';
    h2+='<div class="mr-yesterday-meta">Yesterday \u00b7 '+yShot.infT+'s \u00b7 '+(yShot.grind||'\u2014')+'</div>';
    h2+='</div></div>';
  }

  // Streak
  if(streak>0){
    h2+='<div style="text-align:center;padding:8px 0 4px">';
    h2+='<span style="font-size:9px;letter-spacing:3px;color:var(--fog);text-transform:uppercase">';
    h2+=streak+' day streak \u00b7 '+avgS+' avg \u00b7 '+shots.length+' shots</span></div>';
  }

  h2+='</div>'; // end mr-content

  h2+='<div class="mr-footer">';
  h2+='<button class="mr-pull-btn" id="mr-pull">Pull a Shot</button>';
  h2+='<button class="mr-dismiss" id="mr-skip">Skip \u2014 just show me the log</button>';
  h2+='</div>';

  mr.innerHTML=h2;
  mr.classList.add('open');

  // Wire buttons
  var pullBtn=document.getElementById('mr-pull');
  if(pullBtn)pullBtn.addEventListener('click',function(){
    closeMorning();
    haptic('med');
    go('new');
  });
  var skipBtn=document.getElementById('mr-skip');
  if(skipBtn)skipBtn.addEventListener('click',function(){
    closeMorning();
    go('log');
  });

  // Mark shown today
  settings.lastWelcomeDate=new Date().toISOString().slice(0,10);
  sSt();
}

function closeMorning(){
  var mr=document.getElementById('morning');
  if(mr){mr.classList.remove('open');mr.innerHTML='';}
}

// Keep legacy functions pointing to new system
function shouldShowDW(){return shouldShowMorning();}
function renderDW(){renderMorning();}

  }

}
})();
